services:
  - type: web
    name: bill-splitter-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bill-splitter-db
          property: connectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: bill-splitter-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: bill-splitter-db
          property: password
      - key: PORT
        value: 8080

databases:
  - name: bill-splitter-db
    databaseName: billsplitter
    plan: free